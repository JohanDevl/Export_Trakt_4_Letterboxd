name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

env:
  GO_VERSION: "1.23"
  REGISTRY_IMAGE: johandevl/export-trakt-4-letterboxd
  GITHUB_REGISTRY: ghcr.io
  GITHUB_IMAGE: ghcr.io/johandevl/export_trakt_4_letterboxd

jobs:
  # Job 1: Test and Build Go Application
  test-and-build:
    name: Test and Build Go Application
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_tag: ${{ steps.version.outputs.is_tag }}
      coverage: ${{ steps.coverage.outputs.coverage }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Go tests
        run: go test -timeout 120s -count=1 ./...

      - name: Check test coverage
        id: coverage
        run: |
          # Run tests with coverage, excluding main package
          go test -coverprofile=coverage.out -timeout 120s -count=1 ./pkg/...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Total coverage (excluding main package): $COVERAGE%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "❌ Code coverage is below 50%. Current: $COVERAGE%"
            exit 1
          else
            echo "✅ Coverage check passed! Current: $COVERAGE%, Target: 50%"
          fi

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

      - name: Get version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # For tag pushes, use the tag directly
            VERSION="${{ github.ref_name }}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "🏷️ Building from tag: $VERSION"
          else
            # For branch pushes, get the latest tag
            git fetch --tags
            LATEST_TAG=$(git tag -l "v*" | grep -v "-" | sort -V | tail -n 1)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v1.0.0"
            fi
            echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "📋 Building from branch, using latest tag: $LATEST_TAG"
          fi

      - name: Build Go application
        run: |
          mkdir -p build
          go build -v -ldflags "-X main.version=${{ steps.version.outputs.version }} -X main.buildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ') -X main.gitCommit=${{ github.sha }}" -o build/export_trakt ./cmd/export_trakt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: export-trakt-binary
          path: build/export_trakt

  # Job 2: Build and Push Docker Images (Production)
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: export-trakt-binary
          path: build

      - name: Make binary executable
        run: chmod +x build/export_trakt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_IMAGE }}
            ${{ env.GITHUB_IMAGE }}
          tags: |
            # Latest tag - ONLY for git tags (semantic versions/releases) - points to the latest stable release
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
            # Stable tag - alias for latest, easier to understand for users
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'beta') && !contains(github.ref, 'rc') }}
            # Semantic version tag - ONLY for git tags (releases)
            type=raw,value=${{ needs.test-and-build.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Main branch tag - ONLY for pushes to main branch (not for releases)
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            # Develop branch tag - for pushes to develop branch
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            # Pre-release tags - for beta and RC versions
            type=raw,value=beta,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') }}
            type=raw,value=rc,enable=${{ startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'rc') }}
            # PR tags - for pull request testing
            type=ref,event=pr,prefix=PR-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build date
        id: build_date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ github.ref_name }}
          build-args: |
            VERSION=${{ needs.test-and-build.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.BUILD_DATE }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY_IMAGE }}:develop
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # Job 2b: Build and Push Docker Images for Pull Requests
  docker-pr:
    name: Build and Push Docker Images (PR)
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: export-trakt-binary
          path: build

      - name: Make binary executable
        run: chmod +x build/export_trakt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker (PR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_IMAGE }}
            ${{ env.GITHUB_IMAGE }}
          tags: |
            # PR tags - for pull request testing
            type=ref,event=pr,prefix=PR-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build date
        id: build_date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-pr-${{ github.event.number }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-pr-${{ github.event.number }}
          build-args: |
            VERSION=${{ needs.test-and-build.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.build_date.outputs.BUILD_DATE }}

  # Job 3: Test Docker Image
  docker-test:
    name: Test Docker Image
    needs: [test-and-build, docker]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image for testing
        run: docker pull ${{ env.REGISTRY_IMAGE }}:develop

      - name: Test Docker image
        run: |
          echo "🧪 Testing Docker image functionality..."

          # Create test directories
          mkdir -p ./test_config ./test_logs ./test_exports

          IMAGE="${{ env.REGISTRY_IMAGE }}:develop"

          # Test 1: Help command
          echo "Test 1: --help command"
          docker run --rm \
            -v $(pwd)/test_config:/app/config \
            -v $(pwd)/test_logs:/app/logs \
            -v $(pwd)/test_exports:/app/exports \
            $IMAGE --help
          echo "✅ Test 1 passed: Help command works"

          # Test 2: Version command
          echo "Test 2: --version command"
          docker run --rm $IMAGE --version
          echo "✅ Test 2 passed: Version command works"

          # Test 3: Validate command (check config validation)
          echo "Test 3: validate command"
          docker run --rm \
            -v $(pwd)/config:/app/config:ro \
            $IMAGE validate || echo "⚠️  Validation failed (expected without credentials)"
          echo "✅ Test 3 completed: Validate command executed"

          # Test 4: Check binary permissions and user
          echo "Test 4: Binary permissions and non-root user"
          docker run --rm $IMAGE sh -c "id; ls -la /app/export-trakt" 2>/dev/null || \
          docker run --rm --entrypoint "" $IMAGE /bin/sh -c "id; ls -la /app/export-trakt" 2>/dev/null || \
          echo "⚠️  Shell not available (distroless image)"
          echo "✅ Test 4 completed: User and permissions check"

          # Test 5: Health check (if binary supports --version)
          echo "Test 5: Health check verification"
          docker run --rm $IMAGE --version > /dev/null && \
          echo "✅ Test 5 passed: Health check endpoint works" || \
          echo "⚠️  Test 5 failed: Health check not available"

          # Test 6: Volume mounts writable
          echo "Test 6: Volume mount permissions"
          docker run --rm \
            -v $(pwd)/test_exports:/app/exports \
            --entrypoint "" \
            $IMAGE sh -c "touch /app/exports/test.txt && rm /app/exports/test.txt" 2>/dev/null && \
          echo "✅ Test 6 passed: Export volume is writable" || \
          echo "⚠️  Test 6: Could not test volume permissions (expected for distroless)"

          echo ""
          echo "═══════════════════════════════════════════════════════"
          echo "✅ Docker image tests completed successfully"
          echo "═══════════════════════════════════════════════════════"

  # Job 4: Build and Release Binaries (only on tag pushes)
  release:
    name: Build and Release Binaries
    runs-on: ubuntu-latest
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Set up asset names
        id: assets
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "linux_amd64=export_trakt_${VERSION}_linux_amd64" >> $GITHUB_OUTPUT
          echo "linux_arm64=export_trakt_${VERSION}_linux_arm64" >> $GITHUB_OUTPUT
          echo "linux_arm=export_trakt_${VERSION}_linux_arm" >> $GITHUB_OUTPUT
          echo "darwin_amd64=export_trakt_${VERSION}_darwin_amd64" >> $GITHUB_OUTPUT
          echo "darwin_arm64=export_trakt_${VERSION}_darwin_arm64" >> $GITHUB_OUTPUT
          echo "windows_amd64=export_trakt_${VERSION}_windows_amd64.exe" >> $GITHUB_OUTPUT

      - name: Build for Linux (amd64)
        run: GOOS=linux GOARCH=amd64 go build -o "${{ steps.assets.outputs.linux_amd64 }}" ./cmd/export_trakt

      - name: Build for Linux (arm64)
        run: GOOS=linux GOARCH=arm64 go build -o "${{ steps.assets.outputs.linux_arm64 }}" ./cmd/export_trakt

      - name: Build for Linux (arm)
        run: GOOS=linux GOARCH=arm go build -o "${{ steps.assets.outputs.linux_arm }}" ./cmd/export_trakt

      - name: Build for macOS (amd64)
        run: GOOS=darwin GOARCH=amd64 go build -o "${{ steps.assets.outputs.darwin_amd64 }}" ./cmd/export_trakt

      - name: Build for macOS (arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o "${{ steps.assets.outputs.darwin_arm64 }}" ./cmd/export_trakt

      - name: Build for Windows (amd64)
        run: GOOS=windows GOARCH=amd64 go build -o "${{ steps.assets.outputs.windows_amd64 }}" ./cmd/export_trakt

      - name: Generate checksums
        run: |
          sha256sum ${{ steps.assets.outputs.linux_amd64 }} > ${{ steps.assets.outputs.linux_amd64 }}.sha256
          sha256sum ${{ steps.assets.outputs.linux_arm64 }} > ${{ steps.assets.outputs.linux_arm64 }}.sha256
          sha256sum ${{ steps.assets.outputs.linux_arm }} > ${{ steps.assets.outputs.linux_arm }}.sha256
          sha256sum ${{ steps.assets.outputs.darwin_amd64 }} > ${{ steps.assets.outputs.darwin_amd64 }}.sha256
          sha256sum ${{ steps.assets.outputs.darwin_arm64 }} > ${{ steps.assets.outputs.darwin_arm64 }}.sha256
          sha256sum ${{ steps.assets.outputs.windows_amd64 }} > ${{ steps.assets.outputs.windows_amd64 }}.sha256

      - name: Prepare assets
        run: |
          mkdir -p releases
          cp ${{ steps.assets.outputs.linux_amd64 }} releases/
          cp ${{ steps.assets.outputs.linux_amd64 }}.sha256 releases/
          cp ${{ steps.assets.outputs.linux_arm64 }} releases/
          cp ${{ steps.assets.outputs.linux_arm64 }}.sha256 releases/
          cp ${{ steps.assets.outputs.linux_arm }} releases/
          cp ${{ steps.assets.outputs.linux_arm }}.sha256 releases/
          cp ${{ steps.assets.outputs.darwin_amd64 }} releases/
          cp ${{ steps.assets.outputs.darwin_amd64 }}.sha256 releases/
          cp ${{ steps.assets.outputs.darwin_arm64 }} releases/
          cp ${{ steps.assets.outputs.darwin_arm64 }}.sha256 releases/
          cp ${{ steps.assets.outputs.windows_amd64 }} releases/
          cp ${{ steps.assets.outputs.windows_amd64 }}.sha256 releases/
          cp README.md releases/
          cp LICENSE releases/
          cp -R locales releases/
          cp config/config.example.toml releases/config.toml

          cd releases
          zip -r export_trakt_${{ steps.assets.outputs.version }}_linux_amd64.zip ${{ steps.assets.outputs.linux_amd64 }} ${{ steps.assets.outputs.linux_amd64 }}.sha256 README.md LICENSE locales config.toml
          zip -r export_trakt_${{ steps.assets.outputs.version }}_linux_arm64.zip ${{ steps.assets.outputs.linux_arm64 }} ${{ steps.assets.outputs.linux_arm64 }}.sha256 README.md LICENSE locales config.toml
          zip -r export_trakt_${{ steps.assets.outputs.version }}_linux_arm.zip ${{ steps.assets.outputs.linux_arm }} ${{ steps.assets.outputs.linux_arm }}.sha256 README.md LICENSE locales config.toml
          zip -r export_trakt_${{ steps.assets.outputs.version }}_darwin_amd64.zip ${{ steps.assets.outputs.darwin_amd64 }} ${{ steps.assets.outputs.darwin_amd64 }}.sha256 README.md LICENSE locales config.toml
          zip -r export_trakt_${{ steps.assets.outputs.version }}_darwin_arm64.zip ${{ steps.assets.outputs.darwin_arm64 }} ${{ steps.assets.outputs.darwin_arm64 }}.sha256 README.md LICENSE locales config.toml
          zip -r export_trakt_${{ steps.assets.outputs.version }}_windows_amd64.zip ${{ steps.assets.outputs.windows_amd64 }} ${{ steps.assets.outputs.windows_amd64 }}.sha256 README.md LICENSE locales config.toml

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "Generating release notes for ${{ steps.assets.outputs.version }}"
          VERSION_TAG="${{ steps.assets.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 ${VERSION_TAG}^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)" ${VERSION_TAG})
          else
            COMMITS=$(git log --pretty=format:"* %s (%h)" ${PREV_TAG}..${VERSION_TAG})
          fi

          cat > release_notes.md << EOF
          # Export_Trakt_4_Letterboxd ${{ steps.assets.outputs.version }}

          ## Changes

          ${COMMITS}

          ## Installation

          ### Linux (amd64)
          \`\`\`bash
          curl -LO https://github.com/JohanDevl/Export_Trakt_4_Letterboxd/releases/download/${{ steps.assets.outputs.version }}/export_trakt_${{ steps.assets.outputs.version }}_linux_amd64.zip
          unzip export_trakt_${{ steps.assets.outputs.version }}_linux_amd64.zip
          chmod +x export_trakt_${{ steps.assets.outputs.version }}_linux_amd64
          ./export_trakt_${{ steps.assets.outputs.version }}_linux_amd64 --config config.toml
          \`\`\`

          ### Docker
          \`\`\`bash
          docker pull ${{ env.REGISTRY_IMAGE }}:${{ steps.assets.outputs.version }}
          docker run -v \$(pwd)/config:/app/config -v \$(pwd)/logs:/app/logs -v \$(pwd)/exports:/app/exports ${{ env.REGISTRY_IMAGE }}:${{ steps.assets.outputs.version }}
          \`\`\`

          For more information, see the [documentation](https://github.com/JohanDevl/Export_Trakt_4_Letterboxd/blob/main/README.md).
          EOF

          cat release_notes.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.assets.outputs.version }}
          name: Export_Trakt_4_Letterboxd ${{ steps.assets.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.assets.outputs.version, 'beta') || contains(steps.assets.outputs.version, 'rc') }}
          files: |
            releases/export_trakt_${{ steps.assets.outputs.version }}_linux_amd64.zip
            releases/export_trakt_${{ steps.assets.outputs.version }}_linux_arm64.zip
            releases/export_trakt_${{ steps.assets.outputs.version }}_linux_arm.zip
            releases/export_trakt_${{ steps.assets.outputs.version }}_darwin_amd64.zip
            releases/export_trakt_${{ steps.assets.outputs.version }}_darwin_arm64.zip
            releases/export_trakt_${{ steps.assets.outputs.version }}_windows_amd64.zip
            releases/${{ steps.assets.outputs.linux_amd64 }}
            releases/${{ steps.assets.outputs.linux_arm64 }}
            releases/${{ steps.assets.outputs.linux_arm }}
            releases/${{ steps.assets.outputs.darwin_amd64 }}
            releases/${{ steps.assets.outputs.darwin_arm64 }}
            releases/${{ steps.assets.outputs.windows_amd64 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 5: Notification and Summary
  notify:
    name: Notify and Summarize
    needs: [test-and-build, docker, docker-pr, docker-test, release]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check overall result
        id: check
        run: |
          if ${{ needs.test-and-build.result == 'success' && (needs.docker.result == 'success' || needs.docker.result == 'skipped') && (needs.docker-pr.result == 'success' || needs.docker-pr.result == 'skipped') && (needs.docker-test.result == 'success' || needs.docker-test.result == 'skipped') && (needs.release.result == 'success' || needs.release.result == 'skipped') }}; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ All jobs completed successfully"
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "❌ One or more jobs failed"
          fi

      - name: Create summary
        run: |
          echo "## 🎬 Export Trakt 4 Letterboxd CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Go Tests & Build**: ${{ needs.test-and-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage**: ${{ needs.test-and-build.outputs.coverage }}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.test-and-build.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "- **Docker Build (PR)**: ${{ needs.docker-pr.result }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Docker Build**: ${{ needs.docker.result }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Docker Test**: ${{ needs.docker-test.result }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.status }}" == "success" ]; then
            echo "### ✅ Pipeline Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🐳 Docker Images Published" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              echo "- Docker Hub: \`${{ env.REGISTRY_IMAGE }}:PR-${{ github.event.number }}\`" >> $GITHUB_STEP_SUMMARY
              echo "- GitHub Packages: \`${{ env.GITHUB_IMAGE }}:PR-${{ github.event.number }}\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Docker Hub: \`${{ env.REGISTRY_IMAGE }}:${{ needs.test-and-build.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
              echo "- GitHub Packages: \`${{ env.GITHUB_IMAGE }}:${{ needs.test-and-build.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ❌ Pipeline Status: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "Please check the failed jobs above for more details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create release comment
        if: github.event_name == 'release' && steps.check.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **Release ${{ needs.test-and-build.outputs.version }} Successfully Deployed!**
              
              ### 📦 Docker Images Available:
              - **Docker Hub**: \`${{ env.REGISTRY_IMAGE }}:${{ needs.test-and-build.outputs.version }}\`
              - **GitHub Packages**: \`${{ env.GITHUB_IMAGE }}:${{ needs.test-and-build.outputs.version }}\`
              
              ### 🏗️ Build Information:
              - **Test Coverage**: ${{ needs.test-and-build.outputs.coverage }}%
              - **Supported Platforms**: linux/amd64, linux/arm64, linux/arm/v7
              - **Security Scan**: ✅ Passed
              
              ### 🚀 Quick Start:
              \`\`\`bash
              docker pull ${{ env.REGISTRY_IMAGE }}:${{ needs.test-and-build.outputs.version }}
              \`\`\`
              
              All systems are go! 🚀`
            })