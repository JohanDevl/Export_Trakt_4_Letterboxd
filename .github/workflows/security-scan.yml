name: 🔒 Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  gosec-scan:
    name: 🔍 Static Security Analysis (gosec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download dependencies
        run: |
          echo "📦 Downloading Go dependencies..."
          go mod download
          go mod verify
          echo "✅ Dependencies downloaded successfully"

      - name: Install gosec security scanner
        run: |
          echo "🔧 Installing gosec security scanner..."
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          echo "✅ gosec installation completed"
          gosec --version || echo "Warning: gosec version check failed"

      - name: Run gosec security scanner
        run: |
          echo "🔍 Running gosec security analysis..."

          # Create output directory
          mkdir -p security-reports

          # Run gosec and capture exit code
          EXIT_CODE=0
          gosec -fmt sarif -out gosec-results.sarif ./... || EXIT_CODE=$?

          # Check if scan completed successfully
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ gosec scan failed with exit code $EXIT_CODE"

            # If SARIF file was created despite exit code (warnings treated as errors)
            if [ -f "gosec-results.sarif" ] && [ -s "gosec-results.sarif" ]; then
              echo "⚠️  SARIF file exists - scan completed with warnings/issues"
              echo "Scan will be marked as failed but results will be uploaded"
              # Continue to upload results but mark as failed
            else
              echo "❌ CRITICAL: gosec scan failed without producing results"
              echo "Attempting to run with text format for debugging..."
              gosec -fmt text ./... || true
              echo ""
              echo "🚨 SECURITY SCAN FAILURE - Please fix issues and re-run"
              exit 1
            fi
          fi

          # Verify the SARIF file was created
          if [ -f "gosec-results.sarif" ] && [ -s "gosec-results.sarif" ]; then
            echo "✅ SARIF file created successfully"
            echo "File size: $(wc -c < gosec-results.sarif) bytes"
            echo "First few lines:"
            head -10 gosec-results.sarif || true
          else
            echo "❌ CRITICAL: SARIF file not found or empty"
            echo "🚨 SECURITY SCAN FAILURE - Cannot proceed without scan results"
            exit 1
          fi

          # If we had issues detected, fail the job
          if [ $EXIT_CODE -ne 0 ]; then
            echo "🚨 Security scan detected issues - failing job"
            exit $EXIT_CODE
          fi

      - name: Upload gosec results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('gosec-results.sarif') != ''
        with:
          sarif_file: gosec-results.sarif
          category: gosec-security-scan

      - name: Upload gosec results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results
          path: gosec-results.sarif

  docker-security-scan:
    name: 🐳 Docker and Dependency Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Verify Go modules
        run: |
          echo "🔍 Verifying Go modules..."
          go mod download
          go mod verify
          echo "✅ Go modules verified successfully"

      - name: Install Trivy scanner
        run: |
          echo "📦 Installing Trivy scanner..."
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          echo "✅ Trivy installation completed"
          trivy --version

      - name: Scan Go dependencies with Trivy
        run: |
          echo "🔍 Scanning Go dependencies for vulnerabilities..."
          trivy fs \
            --format sarif \
            --output trivy-fs-results.sarif \
            --severity HIGH,CRITICAL \
            --no-progress \
            .

      - name: Upload Go dependency scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-dependency-scan

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-fs-results.sarif

